server:
  port: ${SERVER_PORT}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}

  cache:
    type: redis
    cache-names: authUsers
    redis:
      time-to-live: 1800000 
      cache-null-values: false

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST}
    port: ${SPRING_RABBITMQ_PORT}
    username: ${SPRING_RABBITMQ_USERNAME}
    password: ${SPRING_RABBITMQ_PASSWORD}

resilience4j:
  circuitbreaker:
    instances:
      authProvider:
        register-health-indicator: true
        event-consumer-buffer-size: 10
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s 
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

app:
  outbox:
    poll-interval: 5000
    batch-size: 20
    max-attempts: 5

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL}
  realm: ${KEYCLOAK_REALM}
  client-id: ${KEYCLOAK_CLIENT_ID}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME}
    password: ${KEYCLOAK_ADMIN_PASSWORD}

cognito:
  user-pool-id: ${COGNITO_USER_POOL_ID}
  client-id: ${COGNITO_CLIENT_ID}
  client-secret: ${COGNITO_CLIENT_SECRET}
  domain-url: ${COGNITO_DOMAIN_URL}
  region: ${AWS_REGION}

auth:
  cookie:
    domain: ${AUTH_COOKIE_DOMAIN}
    secure: ${AUTH_COOKIE_SECURE}
    same-site: ${AUTH_COOKIE_SAME_SITE}
    access-token-max-age: ${AUTH_ACCESS_TOKEN_MAX_AGE}
    refresh-token-max-age: ${AUTH_REFRESH_TOKEN_MAX_AGE}
  github:
    redirect-uri: ${GITHUB_REDIRECT_URI}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[io.github.joaosimsic]': DEBUG
    '[org.springframework.amqp]': DEBUG
