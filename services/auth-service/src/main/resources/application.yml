server:
  port: ${AUTH_SERVICE_PORT}

spring:
  profiles:
    active: ${AUTH_PROFILE}

  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST}:${POSTGRES_PORT}/${POSTGRES_DB} 
    username: ${APP_USER}
    password: ${APP_PASSWORD}
    hikari:
      pool-name: AppHikariCP
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1200000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
      keepalive-time: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  flyway:
    user: ${FLYWAY_USER}
    password: ${FLYWAY_PASSWORD}

  data:
    redis:
      host: ${AUTH_CACHE_HOST}
      port: ${REDIS_PORT}

  cache:
    type: redis
    cache-names: authUsers
    redis:
      time-to-live: 1800000 
      cache-null-values: false

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

resilience4j:
  circuitbreaker:
    instances:
      authProvider:
        register-health-indicator: true
        event-consumer-buffer-size: 10
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s 
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

app:
  outbox:
    poll-interval: ${OUTBOX_POLL_INTERVAL}
    batch-size: ${OUTBOX_BATCH_SIZE}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS}

auth:
  cookie:
    domain: ${AUTH_COOKIE_DOMAIN}
    secure: ${AUTH_COOKIE_SECURE}
    same-site: ${AUTH_COOKIE_SAME_SITE}
    access-token-max-age: ${AUTH_ACCESS_TOKEN_MAX_AGE}
    refresh-token-max-age: ${AUTH_REFRESH_TOKEN_MAX_AGE}
  github:
    redirect-uri: ${GITHUB_REDIRECT_URI}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never 
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    '[com.zaxxer.hikari]': DEBUG
    '[io.github.resilience4j]': DEBUG
    '[org.postgresql]': DEBUG
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.stat]': DEBUG
    '[org.hibernate.type.descriptor.sql.BasicBinder]': TRACE
    '[org.springframework.jdbc.core]': DEBUG
    '[org.springframework.transaction]': DEBUG
    '[org.springframework.cache]': DEBUG
