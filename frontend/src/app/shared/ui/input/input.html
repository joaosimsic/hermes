<div class="w-full">
  <label [for]="id()" class="block text-sm font-medium text-gray-900">{{ label() }}</label>
  <input
    [id]="id()"
    [type]="type()"
    [formControl]="control()"
    class="mt-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-600 focus:ring-blue-600 sm:text-sm"
  />
</div>
