admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
  - name: listener_ws
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8443
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_ws
          upgrade_configs:
          - upgrade_type: websocket
          route_config:
            name: ws_route
            virtual_hosts:
            - name: ws_backend
              domains: ["*"]
              routes:
              - match:
                  prefix: "/ws"
                route:
                  cluster: ws_gateway
                  timeout: 0s
                  idle_timeout: 3600s
              - match:
                  prefix: "/health"
                route:
                  cluster: ws_gateway
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  - name: listener_http
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          route_config:
            name: http_route
            virtual_hosts:
            - name: rest_backend
              domains: ["*"]
              routes:
              - match:
                  prefix: "/auth"
                route:
                  cluster: api_gateway
              - match:
                  prefix: "/users"
                route:
                  cluster: api_gateway
              - match:
                  prefix: "/chat"
                route:
                  cluster: api_gateway
              - match:
                  prefix: "/media"
                route:
                  cluster: api_gateway
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: ws_gateway
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: ws_gateway
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: ws-gateway
                port_value: 8080

  - name: api_gateway
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: api_gateway
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: api-gateway
                port_value: 8080
