services:
  api-gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    environment:
      SERVER_PORT: ${GATEWAY_PORT}
      SPRING_PROFILES_ACTIVE: ${GATEWAY_PROFILE}
      SPRING_DATA_REDIS_HOST: ${GATEWAY_CACHE_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      KC_JWKS_URL: ${KC_JWKS_URL}
      KC_JWT_ISSUER: ${KC_JWT_ISSUER}
      COGNITO_JWKS_URL: ${COGNITO_JWKS_URL}
      COGNITO_JWT_ISSUER: ${COGNITO_JWT_ISSUER}
      USER_SERVICE_URL: http://${USER_SERVICE_HOST}:${GATEWAY_PORT}
      AUTH_SERVICE_URL: http://${AUTH_SERVICE_HOST}:${GATEWAY_PORT}
      CORS_ALLOWED_ORIGINS: ${FRONTEND_URL}
      GATEWAY_SECRET: ${GATEWAY_SECRET}
      RATE_LIMIT_AUTHENTICATED: ${RATE_LIMIT_AUTHENTICATED}
      RATE_LIMIT_AUTHENTICATED_BURST: ${RATE_LIMIT_AUTHENTICATED_BURST}
      RATE_LIMIT_UNAUTHENTICATED: ${RATE_LIMIT_UNAUTHENTICATED}
      RATE_LIMIT_UNAUTHENTICATED_BURST: ${RATE_LIMIT_UNAUTHENTICATED_BURST}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
    depends_on:
      - user-cache
      - user-service
      - auth-service

  gateway-cache:
    image: redis:7-alpine
    container_name: ${GATEWAY_CACHE_HOST}
    ports:
      - "${GATEWAY_CACHE_PORT}:6379"
    volumes:
      - gateway_cache_data:/data

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: ${AUTH_SERVICE_HOST}
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    environment:
      SERVER_PORT: ${AUTH_SERVICE_PORT}
      SPRING_PROFILES_ACTIVE: ${AUTH_PROFILE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${AUTH_DB_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${APP_PASSWORD}
      SPRING_FLYWAY_USER: ${FLYWAY_USER}
      SPRING_FLYWAY_PASSWORD: ${FLYWAY_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${AUTH_CACHE_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      KEYCLOAK_SERVER_URL: http://keycloak:${KEYCLOAK_PORT}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI}
      AUTH_ACCESS_TOKEN_MAX_AGE: ${AUTH_ACCESS_TOKEN_MAX_AGE}
      AUTH_REFRESH_TOKEN_MAX_AGE: ${AUTH_REFRESH_TOKEN_MAX_AGE}
    depends_on:
      - keycloak
      - rabbitmq
      - auth-cache

  auth-db:
    image: postgres:16-alpine
    container_name: ${AUTH_DB_HOST}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD}
      APP_USER: ${APP_USER}
      APP_PASSWORD: ${APP_PASSWORD}
    ports:
      - "${AUTH_DB_PORT}:${POSTGRES_PORT}"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  auth-cache:
    image: redis:7-alpine
    container_name: ${AUTH_CACHE_HOST}
    ports:
      - "${AUTH_CACHE_PORT}:6379"
    volumes:
      - auth_cache_data:/data

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: ${USER_SERVICE_HOST}
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    environment:
      SERVER_PORT: ${USER_SERVICE_PORT}
      APP_JWT_SECRET: ${GATEWAY_SECRET}
      SPRING_PROFILES_ACTIVE: ${USER_PROFILE}
      SPRING_DATASOURCE_URL: jdbc:postgresql://${USER_DB_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${APP_PASSWORD}
      SPRING_FLYWAY_USER: ${FLYWAY_USER}
      SPRING_FLYWAY_PASSWORD: ${FLYWAY_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${USER_CACHE_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_CLOUD_AWS_REGION_STATIC: ${AWS_DEFAULT_REGION}
      SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      - user-db
      - rabbitmq

  user-db:
    image: postgres:16-alpine
    container_name: ${USER_DB_HOST}
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${FLYWAY_PASSWORD}
      APP_USER: ${APP_USER}
      APP_PASSWORD: ${APP_PASSWORD}
    ports:
      - "${USER_DB_PORT}:${POSTGRES_PORT}"
    volumes:
      - user_db_data:/var/lib/postgresql/data
      - ./infrastructure/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  user-cache:
    image: redis:7-alpine
    container_name: ${USER_CACHE_HOST}
    ports:
      - "${USER_CACHE_PORT}:6379"
    volumes:
      - user_cache_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ${RABBITMQ_HOST}
    ports:
      - "${RABBITMQ_PORT}:${RABBITMQ_PORT}"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    ports:
      - "${KEYCLOAK_PORT}:${KEYCLOAK_PORT}"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
    command: start-dev --import-realm --http-port=${KEYCLOAK_PORT}
    volumes:
      - ./infrastructure/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json

  nats:
    image: nats:2.10-alpine
    container_name: ${NATS_HOST}
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    ports:
      - "${NATS_PORT}:4222"
      - "8222:8222"
      - "6222:6222"
    volumes:
      - nats_data:/data

  scylladb:
    image: scylladb/scylla:5.4
    container_name: ${SCYLLA_HOST}
    command: --smp 1 --memory 512M --overprovisioned 1 --developer-mode 1
    ports:
      - "${SCYLLA_PORT}:9042"
      - "9160:9160"
      - "10000:10000"
    volumes:
      - scylla_data:/var/lib/scylla
      - ./infrastructure/scylla/init.cql:/docker-entrypoint-initdb.d/init.cql
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: ${MINIO_HOST}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT}:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb local/media --ignore-existing;
      mc anonymous set download local/media;
      exit 0;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

  ws-gateway:
    build:
      context: .
      dockerfile: services/ws-gateway/Dockerfile
    container_name: ${WS_GATEWAY_HOST}
    ports:
      - "${WS_GATEWAY_PORT}:8080"
    environment:
      SERVER_PORT: "8080"
      NATS_URL: nats://${NATS_HOST}:4222
      JWKS_URL: http://keycloak:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/certs
      JWT_ISSUER: http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
      JWKS_CACHE_TTL: "3600"
      LOG_LEVEL: debug
      CHAT_SERVICE_URL: http://${CHAT_SERVICE_HOST}:8080
    depends_on:
      - nats
      - keycloak

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    container_name: ${CHAT_SERVICE_HOST}
    ports:
      - "${CHAT_SERVICE_PORT}:8080"
    environment:
      SERVER_PORT: "8080"
      APP_JWT_SECRET: ${GATEWAY_SECRET}
      SCYLLA_HOST: ${SCYLLA_HOST}
      SCYLLA_PORT: ${SCYLLA_PORT}
      SPRING_DATA_REDIS_HOST: ${CHAT_CACHE_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NATS_URL: nats://${NATS_HOST}:4222
    depends_on:
      scylladb:
        condition: service_healthy
      nats:
        condition: service_started
      rabbitmq:
        condition: service_started
      chat-cache:
        condition: service_started

  chat-cache:
    image: redis:7-alpine
    container_name: ${CHAT_CACHE_HOST}
    ports:
      - "${CHAT_CACHE_PORT}:6379"
    volumes:
      - chat_cache_data:/data

  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: envoy
    ports:
      - "${ENVOY_HTTP_PORT}:8080"
      - "${ENVOY_WS_PORT}:8443"
      - "9901:9901"
    volumes:
      - ./infrastructure/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      - api-gateway
      - ws-gateway
      - chat-service

volumes:
  gateway_cache_data:
  auth_db_data:
  auth_cache_data:
  user_db_data:
  user_cache_data:
  rabbitmq_data:
  nats_data:
  scylla_data:
  minio_data:
  chat_cache_data:
