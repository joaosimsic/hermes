apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
labels:
- pairs:
    environment: prod
  includeSelectors: true
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 3
  target:
    kind: Deployment
    name: nats
- patch: |-
    - op: replace
      path: /spec/resources/requests/storage
      value: 20Gi
  target:
    kind: PersistentVolumeClaim
    name: nats-data
