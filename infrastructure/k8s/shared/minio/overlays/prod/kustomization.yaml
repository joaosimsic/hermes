apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
secretGenerator:
- name: minio-secrets
  envs:
  - secrets.env
labels:
- pairs:
    environment: prod
  includeSelectors: true
patches:
- patch: |-
    - op: replace
      path: /spec/resources/requests/storage
      value: 100Gi
  target:
    kind: PersistentVolumeClaim
    name: minio-data
