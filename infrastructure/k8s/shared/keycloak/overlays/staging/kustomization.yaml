apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
configMapGenerator:
- name: keycloak-config
  envs:
  - params.env
secretGenerator:
- name: keycloak-secrets
  envs:
  - secrets.env
patches:
- patch: "apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: keycloak\nspec:\n\
    \  replicas: 2\n  template:\n    spec:\n      containers:\n      - name: keycloak\n\
    \        args:\n          - start\n          - --import-realm\n          - --http-port=8180\n\
    \          - --hostname-strict=false\n        resources:\n          requests:\n\
    \            memory: \"1Gi\"\n            cpu: \"1000m\"\n          limits:\n\
    \            memory: \"2Gi\"\n            cpu: \"2000m\""
labels:
- pairs:
    environment: staging
  includeSelectors: true
