apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
configMapGenerator:
- name: keycloak-config
  envs:
  - params.env
secretGenerator:
- name: keycloak-secrets
  envs:
  - secrets.env
patches:
- patch: "apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: keycloak\nspec:\n\
    \  replicas: 3\n  template:\n    spec:\n      containers:\n      - name: keycloak\n\
    \        args:\n          - start\n          - --import-realm\n          - --http-port=8180\n\
    \          - --hostname-strict=false\n          - --proxy=edge\n        resources:\n\
    \          requests:\n            memory: \"2Gi\"\n            cpu: \"2000m\"\n\
    \          limits:\n            memory: \"4Gi\"\n            cpu: \"4000m\""
labels:
- pairs:
    environment: prod
  includeSelectors: true
