apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
configMapGenerator:
- name: keycloak-config
  envs:
  - params.env
secretGenerator:
- name: keycloak-secrets
  envs:
  - secrets.env
labels:
- pairs:
    environment: dev
  includeSelectors: true
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: keycloak
    spec:
      template:
        spec:
          containers:
          - name: keycloak
            readinessProbe:
              initialDelaySeconds: 30
              periodSeconds: 5
            livenessProbe:
              initialDelaySeconds: 60
              periodSeconds: 15
