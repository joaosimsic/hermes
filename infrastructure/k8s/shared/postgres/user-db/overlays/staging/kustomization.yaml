apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
configMapGenerator:
- name: user-postgres-config
  envs:
  - params.env
secretGenerator:
- name: user-postgres-secrets
  envs:
  - secrets.env
patches:
- patch: "apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: user-postgres\n\
    spec:\n  template:\n    spec:\n      containers:\n      - name: postgres\n   \
    \     resources:\n          requests:\n            memory: \"512Mi\"\n       \
    \     cpu: \"500m\"\n          limits:\n            memory: \"1Gi\"\n        \
    \    cpu: \"1000m\""
- patch: "apiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: user-postgres-data\n\
    spec:\n  resources:\n    requests:\n      storage: 20Gi"
labels:
- pairs:
    environment: staging
  includeSelectors: true
