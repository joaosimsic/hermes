apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-postgres
  labels:
    app: user-postgres
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: user-postgres
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        envFrom:
        - configMapRef:
            name: user-postgres-config
        - secretRef:
            name: user-postgres-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - $(POSTGRES_USER)
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: user-postgres-data
      - name: init-script
        configMap:
          name: postgres-init-script
          defaultMode: 0755
