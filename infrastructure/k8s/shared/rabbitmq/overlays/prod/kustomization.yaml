apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
secretGenerator:
- name: rabbitmq-secrets
  envs:
  - secrets.env
patches:
- patch: "apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: rabbitmq\nspec:\n\
    \  replicas: 3\n  template:\n    spec:\n      containers:\n      - name: rabbitmq\n\
    \        resources:\n          requests:\n            memory: \"1Gi\"\n      \
    \      cpu: \"1000m\"\n          limits:\n            memory: \"2Gi\"\n      \
    \      cpu: \"2000m\""
- patch: "apiVersion: v1\nkind: PersistentVolumeClaim\nmetadata:\n  name: rabbitmq-data\n\
    spec:\n  resources:\n    requests:\n      storage: 50Gi"
labels:
- pairs:
    environment: prod
  includeSelectors: true
