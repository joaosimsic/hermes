apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../../../shared/postgres/auth-db/overlays/prod
- ../../../../shared/redis/auth-redis/overlays/prod
namePrefix: auth-
configMapGenerator:
- name: auth-service-config
  envs:
  - params.env
secretGenerator:
- name: auth-service-secrets
  envs:
  - secrets.env
patches:
- patch: "apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: auth-service\n\
    spec:\n  replicas: 3\n  template:\n    spec:\n      containers:\n      - name:\
    \ auth-service\n        resources:\n          requests:\n            memory: \"\
    1Gi\"\n            cpu: \"1000m\"\n          limits:\n            memory: \"2Gi\"\
    \n            cpu: \"2000m\""
labels:
- pairs:
    environment: prod
  includeSelectors: true
