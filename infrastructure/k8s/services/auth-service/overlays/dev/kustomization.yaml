apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ../../../../shared/postgres/auth-db/overlays/dev
- ../../../../shared/redis/auth-redis/overlays/dev
namePrefix: auth-
configMapGenerator:
- name: auth-service-config
  envs:
  - params.env
secretGenerator:
- name: auth-service-secrets
  envs:
  - secrets.env
labels:
- pairs:
    environment: dev
  includeSelectors: true
