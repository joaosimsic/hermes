server:
  port: ${GATEWAY_PORT}

spring:
  application:
    name: api-gateway
  profiles:
    active: ${GATEWAY_PROFILE}

  data:
    redis:
      host: ${GATEWAY_CACHE_HOST}
      port: ${REDIS_PORT}

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST}:${AUTH_SERVICE_PORT}
          predicates:
            - Path=/auth/**
          filters:
            - RewritePath=/auth(?<segment>/?.*), /api/auth${segment}
            - name: RequestRateLimiter
              args:
                '[redis-rate-limiter.replenishRate]': ${RATE_LIMIT_UNAUTHENTICATED}
                '[redis-rate-limiter.burstCapacity]': ${RATE_LIMIT_UNAUTHENTICATED_BURST}
                '[redis-rate-limiter.requestedTokens]': 1
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth-service

        - id: user-service
          uri: http://${USER_SERVICE_HOST}:${USER_SERVICE_PORT}
          predicates:
            - Path=/users/**
          filters:
            - RewritePath=/users(?<segment>/?.*), /api/users${segment}
            - name: RequestRateLimiter
              args:
                '[redis-rate-limiter.replenishRate]': ${RATE_LIMIT_AUTHENTICATED}
                '[redis-rate-limiter.burstCapacity]': ${RATE_LIMIT_AUTHENTICATED_BURST}
                '[redis-rate-limiter.requestedTokens]': 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: userServiceCircuitBreaker
                fallbackUri: forward:/fallback/user-service

        - id: jwks
          uri: http://${USER_SERVICE_HOST}:${USER_SERVICE_PORT}
          predicates:
            - Path=/.well-known/jwks.json

        - id: user-service-docs
          uri: http://${USER_SERVICE_HOST}:${USER_SERVICE_PORT}
          predicates:
            - Path=/swagger-ui/**,/v3/api-docs/**

gateway:
  secret: ${GATEWAY_SECRET}
  rate-limit:
    authenticated:
      replenish-rate: ${RATE_LIMIT_AUTHENTICATED}
      burst-capacity: ${RATE_LIMIT_AUTHENTICATED_BURST}
    unauthenticated:
      replenish-rate: ${RATE_LIMIT_UNAUTHENTICATED}
      burst-capacity: ${RATE_LIMIT_UNAUTHENTICATED_BURST}

resilience4j:
  circuitbreaker:
    instances:
      userServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
      authServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      userServiceCircuitBreaker:
        timeoutDuration: 10s
      authServiceCircuitBreaker:
        timeoutDuration: 10s

management:
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    '[io.github.joaosimsic.gateway]': DEBUG
    '[org.springframework.cloud.gateway]': DEBUG
